<svg width="1280" height="1600" viewBox="0 0 1280 1600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Imbas OS roadmap</title>
<desc id="desc">Nine milestone roadmap from HTML Artifact Vault alpha through Imbas OS public 1.0.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="1600"><stop stop-color="#070A16"/><stop offset="1" stop-color="#101827"/></linearGradient>
  <linearGradient id="rail" x1="640" y1="195" x2="640" y2="1430"><stop stop-color="#38BDF8"/><stop offset="0.35" stop-color="#A78BFA"/><stop offset="0.7" stop-color="#F472B6"/><stop offset="1" stop-color="#FB7185"/></linearGradient>
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="18" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <style>
    .title{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:56px;font-weight:850;letter-spacing:-2px;fill:#F8FAFC}
    .subtitle{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:24px;font-weight:650;fill:#A5B4FC}
    .lane{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:16px;font-weight:650;fill:#94A3B8}
    .m{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:22px;font-weight:850;fill:#0F172A}
    .h{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:24px;font-weight:850;fill:#F8FAFC}
    .d{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:17px;font-weight:520;fill:#CBD5E1}
    .small{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:15px;font-weight:600;fill:#94A3B8}
  </style>
</defs>
<rect width="1280" height="1600" rx="42" fill="url(#bg)"/>
<circle cx="1090" cy="140" r="170" fill="#7C3AED" fill-opacity=".15"/>
<circle cx="145" cy="1450" r="230" fill="#0EA5E9" fill-opacity=".12"/>
<circle cx="1135" cy="1320" r="210" fill="#F472B6" fill-opacity=".10"/>

<text x="72" y="92" class="title">Imbas OS roadmap</text>
<text x="75" y="132" class="subtitle">HTML Artifact Vault first — then memory, agents, mobile, sync, trust, and 1.0.</text>
<text x="75" y="166" class="lane">Each milestone has its own scope and verification gate. Alpha readiness lives inside M1.</text>

<path d="M640 220 L640 1420" stroke="url(#rail)" stroke-width="10" stroke-linecap="round" filter="url(#glow)" opacity=".95"/>

<!-- M1 -->
<circle cx="640" cy="250" r="32" fill="#38BDF8"/><text x="622" y="258" class="m">M1</text>
<g transform="translate(80 205)"><rect width="470" height="142" rx="24" fill="#0F172A" stroke="#38BDF8" stroke-width="2"/><text x="26" y="40" class="h">HTML Artifact Vault alpha</text><text x="26" y="72" class="d">Human folder tree, first-run clarity, import/paste polish</text><text x="26" y="100" class="d">Readable bundles, provenance, AI context export, snapshots</text><text x="26" y="124" class="small">Gate: package.dev + smoke/security smoke + public README clarity</text></g>

<!-- M2 -->
<circle cx="640" cy="390" r="32" fill="#22D3EE"/><text x="620" y="398" class="m">M2</text>
<g transform="translate(730 345)"><rect width="470" height="142" rx="24" fill="#0F172A" stroke="#22D3EE" stroke-width="2"/><text x="26" y="40" class="h">Artifact Vault beta</text><text x="26" y="72" class="d">Drag/drop, zip bundle import/export, snapshot diff</text><text x="26" y="100" class="d">Gallery filters, graph polish, richer demo vault</text><text x="26" y="124" class="small">Gate: daily-use vault workflow feels real, portable, and safe</text></g>

<!-- M3 -->
<circle cx="640" cy="530" r="32" fill="#60A5FA"/><text x="620" y="538" class="m">M3</text>
<g transform="translate(80 485)"><rect width="470" height="142" rx="24" fill="#0F172A" stroke="#60A5FA" stroke-width="2"/><text x="26" y="40" class="h">Conduit + Runledger foundation</text><text x="26" y="72" class="d">Stable local connector API and OpenClaw path</text><text x="26" y="100" class="d">Run replay/export, human cards, AI JSON refs</text><text x="26" y="124" class="small">Gate: connector failure tests and durable audit timeline</text></g>

<!-- M4 -->
<circle cx="640" cy="670" r="32" fill="#A78BFA"/><text x="619" y="678" class="m">M4</text>
<g transform="translate(730 625)"><rect width="470" height="142" rx="24" fill="#0F172A" stroke="#A78BFA" stroke-width="2"/><text x="26" y="40" class="h">Lorekeeper reviewed wiki</text><text x="26" y="72" class="d">Proposal creation, visual diff/review, restore UI</text><text x="26" y="100" class="d">Safe auto-apply lanes, wiki context export, citations</text><text x="26" y="124" class="small">Gate: humans can approve, reject, inspect, and recover</text></g>

<!-- M5 -->
<circle cx="640" cy="810" r="32" fill="#C084FC"/><text x="619" y="818" class="m">M5</text>
<g transform="translate(80 765)"><rect width="470" height="142" rx="24" fill="#0F172A" stroke="#C084FC" stroke-width="2"/><text x="26" y="40" class="h">Memsocket first-class integration</text><text x="26" y="72" class="d">Merge/vendor release story, memory governance</text><text x="26" y="100" class="d">Retrieval evals, context-pack quality, MemPalace bridge</text><text x="26" y="124" class="small">Gate: migration exit criteria before any MemPalace retirement</text></g>

<!-- M6 -->
<circle cx="640" cy="950" r="32" fill="#D946EF"/><text x="619" y="958" class="m">M6</text>
<g transform="translate(730 905)"><rect width="470" height="142" rx="24" fill="#0F172A" stroke="#D946EF" stroke-width="2"/><text x="26" y="40" class="h">Sanctum trust + capabilities</text><text x="26" y="72" class="d">OS keyring/passphrase UX, capability requests</text><text x="26" y="100" class="d">Approval queue, redaction tests, execution-boundary secrets</text><text x="26" y="124" class="small">Gate: sensitive access audited without raw secret exposure</text></g>

<!-- M7 -->
<circle cx="640" cy="1090" r="32" fill="#F472B6"/><text x="620" y="1098" class="m">M7</text>
<g transform="translate(80 1045)"><rect width="470" height="142" rx="24" fill="#0F172A" stroke="#F472B6" stroke-width="2"/><text x="26" y="40" class="h">Android companion</text><text x="26" y="72" class="d">QR pairing, persisted secure session, live data views</text><text x="26" y="100" class="d">Photo/audio capture, notifications/approvals, APK flow</text><text x="26" y="124" class="small">Gate: physical-phone pairing and scoped mobile actions verified</text></g>

<!-- M8 -->
<circle cx="640" cy="1230" r="32" fill="#FB7185"/><text x="619" y="1238" class="m">M8</text>
<g transform="translate(730 1185)"><rect width="470" height="142" rx="24" fill="#0F172A" stroke="#FB7185" stroke-width="2"/><text x="26" y="40" class="h">Atlas, CLI, SyncCore, recovery</text><text x="26" y="72" class="d">Unified graph/search, admin CLI, machine status</text><text x="26" y="100" class="d">Backup/restore UI, import/export, conflicts, delete/forget</text><text x="26" y="124" class="small">Gate: fresh-system restore proof and recovery story</text></g>

<!-- M9 -->
<circle cx="640" cy="1370" r="32" fill="#FCA5A5"/><text x="618" y="1378" class="m">M9</text>
<g transform="translate(80 1325)"><rect width="470" height="142" rx="24" fill="#0F172A" stroke="#FCA5A5" stroke-width="2"/><text x="26" y="40" class="h">Public 1.0 release candidate</text><text x="26" y="72" class="d">Fresh-system, docs, verification, security gates</text><text x="26" y="100" class="d">Installer/package posture, rollback, explicit approval</text><text x="26" y="124" class="small">Gate: no public 1.0 without Johnathan approval</text></g>

<text x="72" y="1538" fill="#94A3B8" font-family="Inter,ui-sans-serif,system-ui" font-size="18">Free/open-source local core first. Hosted/team/business features remain a separate future product line.</text>
</svg>
