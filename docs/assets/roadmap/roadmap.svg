<g font-family="Inter, ui-sans-serif, system-ui">
<g transform="translate(70 270)"><rect width="178" height="162" rx="24" fill="#0F172A" stroke="#38BDF8"/><text x="22" y="42" fill="#7DD3FC" font-size="20" font-weight="800">M0</text><text x="22" y="75" fill="#F8FAFC" font-size="22" font-weight="800">Alpha readiness</text><text x="22" y="108" fill="#CBD5E1" font-size="15">license · security</text><text x="22" y="132" fill="#CBD5E1" font-size="15">screenshots · audit</text></g>
<g transform="translate(286 392)"><rect width="196" height="172" rx="24" fill="#0F172A" stroke="#22D3EE"/><text x="22" y="42" fill="#67E8F9" font-size="20" font-weight="800">M1</text><text x="22" y="75" fill="#F8FAFC" font-size="22" font-weight="800">HTML Vault alpha</text><text x="22" y="108" fill="#CBD5E1" font-size="15">import · sandbox</text><text x="22" y="132" fill="#CBD5E1" font-size="15">snapshots · search</text></g>
<g transform="translate(520 255)"><rect width="190" height="170" rx="24" fill="#0F172A" stroke="#A78BFA"/><text x="22" y="42" fill="#C4B5FD" font-size="20" font-weight="800">M2</text><text x="22" y="75" fill="#F8FAFC" font-size="22" font-weight="800">Artifact beta</text><text x="22" y="108" fill="#CBD5E1" font-size="15">drag/drop · zip</text><text x="22" y="132" fill="#CBD5E1" font-size="15">context export</text></g>
<g transform="translate(744 395)"><rect width="214" height="172" rx="24" fill="#0F172A" stroke="#C084FC"/><text x="22" y="42" fill="#D8B4FE" font-size="20" font-weight="800">M3–M5</text><text x="22" y="75" fill="#F8FAFC" font-size="22" font-weight="800">Agents + memory</text><text x="22" y="108" fill="#CBD5E1" font-size="15">Conduit · Runledger</text><text x="22" y="132" fill="#CBD5E1" font-size="15">Lorekeeper · Memsocket</text></g>
<g transform="translate(996 226)"><rect width="214" height="184" rx="24" fill="#0F172A" stroke="#F472B6"/><text x="22" y="42" fill="#F9A8D4" font-size="20" font-weight="800">M6–M9</text><text x="22" y="75" fill="#F8FAFC" font-size="22" font-weight="800">Imbas OS 1.0</text><text x="22" y="108" fill="#CBD5E1" font-size="15">Sanctum · Android</text><text x="22" y="132" fill="#CBD5E1" font-size="15">Atlas · CLI · Sync</text><text x="22" y="156" fill="#94A3B8" font-size="14">fresh gate · approval</text></g>
</g><text x="72" y="656" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui" font-size="18">Free/open-source local core. Hosted/team/business features are a separate future product line.</text>
