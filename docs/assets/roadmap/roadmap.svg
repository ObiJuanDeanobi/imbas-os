<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Imbas OS roadmap</title><desc id="desc">Roadmap from HTML Artifact Vault alpha to Imbas OS 1.0.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720"><stop stop-color="#070A16"/><stop offset="1" stop-color="#101827"/></linearGradient><linearGradient id="line" x1="110" y1="385" x2="1165" y2="385"><stop stop-color="#38BDF8"/><stop offset=".48" stop-color="#A78BFA"/><stop offset="1" stop-color="#F472B6"/></linearGradient></defs>
<rect width="1280" height="720" rx="36" fill="url(#bg)"/>
<circle cx="1018" cy="117" r="145" fill="#7C3AED" fill-opacity=".14"/><circle cx="160" cy="610" r="160" fill="#0EA5E9" fill-opacity=".11"/>
<text x="72" y="92" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui" font-size="54" font-weight="850" letter-spacing="-2">Imbas OS roadmap</text>
<text x="75" y="132" fill="#A5B4FC" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="650">HTML Artifact Vault first, then the local-first AI operating layer.</text>
