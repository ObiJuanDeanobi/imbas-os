<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1350 360" role="img" aria-labelledby="title desc"><title id="title">ImbasOS wordmark</title><desc id="desc">ImbasOS wordmark with silver Imbas and gold OS.</desc><defs><linearGradient id="silver" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="0.45" stop-color="#D6DCE5"/><stop offset="1" stop-color="#8B95A4"/></linearGradient><linearGradient id="gold" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFF0A2"/><stop offset="0.45" stop-color="#F2B835"/><stop offset="1" stop-color="#B66C00"/></linearGradient></defs><rect width="1350" height="360" fill="none"/><text x="40" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="210" font-weight="700" letter-spacing="-8" fill="url(#silver)">Imbas</text><text x="790" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="210" font-weight="700" letter-spacing="-8" fill="url(#gold)">OS</text></svg>