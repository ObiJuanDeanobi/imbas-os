<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc"><title id="title">Artifact Vault showcase banner</title><desc id="desc">Vector banner for Artifact Vault with feature list and dashboard illustration.</desc><defs><radialGradient id="bg" cx="62%" cy="45%" r="75%"><stop offset="0" stop-color="#08234A"/><stop offset="1" stop-color="#010814"/></radialGradient><linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFF1A8"/><stop offset="0.5" stop-color="#F2B835"/><stop offset="1" stop-color="#9B5D00"/></linearGradient><linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#00A7FF"/><stop offset="1" stop-color="#0057D9"/></linearGradient></defs><rect width="1600" height="1000" fill="url(#bg)"/><g fill="none" stroke="url(#gold)" stroke-width="2" opacity=".55"><path d="M790 820 C1040 630 1180 900 1550 640"/><path d="M840 160 C1040 220 1290 100 1580 140"/><path d="M790 750 C1040 520 1230 760 1600 460"/></g><text x="80" y="155" font-family="Inter, Arial, sans-serif" font-size="84" font-weight="800" fill="#fff" letter-spacing="2">ARTIFACT VAULT</text><text x="80" y="235" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="700" fill="url(#gold)">Save it. Replay it. Evolve it.</text><text x="80" y="330" font-family="Inter, Arial, sans-serif" font-size="32" fill="#D8DEE9">A local-first vault for AI-generated artifacts</text><text x="80" y="380" font-family="Inter, Arial, sans-serif" font-size="32" fill="#D8DEE9">with metadata, notes, provenance,</text><text x="80" y="430" font-family="Inter, Arial, sans-serif" font-size="32" fill="#D8DEE9">snapshots, search, and AI-context export.</text><g font-family="Inter, Arial, sans-serif" font-size="30" fill="#fff" font-weight="700"><text x="165" y="520">Sandboxed Replay</text><text x="165" y="640">Metadata &amp; Provenance</text><text x="165" y="760">Snapshots &amp; Versions</text><text x="165" y="880">AI Context Export</text></g><g font-family="Inter, Arial, sans-serif" font-size="24" fill="#C9D3E2"><text x="165" y="558">Safe by default. Network blocked.</text><text x="165" y="678">Track prompts, models, and history.</text><text x="165" y="798">Evolve and restore with ease.</text><text x="165" y="918">Copy everything your AI needs.</text></g><g fill="none" stroke="url(#gold)" stroke-width="8"><circle cx="105" cy="505" r="28"/><path d="M105 460 v-28 M105 578 v-28 M60 505 H32 M178 505 h-28"/><path d="M78 616 h54 l24 26 v54 l-24 26 H78 l-24-26 v-54z"/><path d="M82 740 h60 v80 H82z M112 720 v120 M72 780 h80"/><path d="M82 858 h72 v72 H82z M106 906 l32-32"/></g><g transform="translate(770 190)"><rect x="40" y="10" width="620" height="520" rx="30" fill="#05152D" stroke="#6FA8FF" stroke-width="3"/><rect x="75" y="70" width="550" height="210" rx="16" fill="#071E3F" stroke="#1A5DAD"/><path d="M105 245 C160 160 200 230 250 145 C310 240 350 135 410 198 C470 120 520 180 600 95" fill="none" stroke="url(#blue)" stroke-width="24" stroke-linecap="round"/><circle cx="215" cy="395" r="88" fill="none" stroke="#0B4CAE" stroke-width="34"/><path d="M215 307 a88 88 0 0 1 82 120" fill="none" stroke="url(#gold)" stroke-width="34"/><text x="168" y="410" font-family="Inter, Arial" font-size="44" fill="#fff">78%</text><rect x="350" y="340" width="240" height="130" rx="14" fill="#071E3F" stroke="#1A5DAD"/><g fill="url(#blue)"><rect x="380" y="420" width="18" height="34"/><rect x="420" y="390" width="18" height="64"/><rect x="460" y="365" width="18" height="89"/><rect x="500" y="405" width="18" height="49"/><rect x="540" y="350" width="18" height="104"/></g><rect x="555" y="440" width="135" height="135" rx="24" fill="#071E3F" stroke="url(#gold)" stroke-width="6"/><text x="588" y="525" font-family="monospace" font-size="62" fill="url(#gold)">&lt;/&gt;</text></g></svg>